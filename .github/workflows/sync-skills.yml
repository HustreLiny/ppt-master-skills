name: Sync skills when upstream release changes

on:
  workflow_dispatch:
    inputs:
      force_sync:
        description: "Force sync even if upstream release did not change"
        required: true
        default: false
        type: boolean
      publish_release:
        description: "Create release assets after syncing"
        required: true
        default: true
        type: boolean

  schedule:
    # 每天 UTC 00:00 自动检查一次。BJ时间约 8:00。
    - cron: "0 0 * * *"

concurrency:
  group: sync-skills-upstream-release
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest

    env:
      UPSTREAM_REPO: hugohe3/ppt-master
      UPSTREAM_PATH: skills

    steps:
      - name: Checkout target repository
        uses: actions/checkout@v4
        with:
          path: target
          fetch-depth: 0

      - name: Read latest upstream release
        id: release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          if ! gh release view \
            --repo "$UPSTREAM_REPO" \
            --json tagName,url,publishedAt,targetCommitish,isDraft,isPrerelease \
            > latest-release.json; then
            echo "No upstream release found."
            echo "found=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          tag="$(jq -r '.tagName' latest-release.json)"
          url="$(jq -r '.url' latest-release.json)"
          published_at="$(jq -r '.publishedAt' latest-release.json)"
          is_prerelease="$(jq -r '.isPrerelease' latest-release.json)"

          echo "found=true" >> "$GITHUB_OUTPUT"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "url=$url" >> "$GITHUB_OUTPUT"
          echo "published_at=$published_at" >> "$GITHUB_OUTPUT"
          echo "is_prerelease=$is_prerelease" >> "$GITHUB_OUTPUT"

          echo "Latest upstream release: $tag"
          echo "Release URL: $url"

      - name: Stop if upstream has no release
        if: steps.release.outputs.found != 'true'
        run: |
          echo "No upstream release found. Nothing to sync."

      - name: Checkout upstream skills folder at latest release tag
        if: steps.release.outputs.found == 'true'
        uses: actions/checkout@v4
        with:
          repository: hugohe3/ppt-master
          ref: ${{ steps.release.outputs.tag }}
          path: upstream
          sparse-checkout: |
            skills
            LICENSE
          sparse-checkout-cone-mode: true

      - name: Decide whether sync is needed
        if: steps.release.outputs.found == 'true'
        id: decide
        env:
          FORCE_SYNC: ${{ github.event_name == 'workflow_dispatch' && inputs.force_sync }}
        run: |
          set -euo pipefail

          upstream_sha="$(git -C upstream rev-parse HEAD)"
          upstream_short_sha="$(git -C upstream rev-parse --short=12 HEAD)"

          state_file="target/.sync/upstream-release.json"

          last_tag=""
          last_sha=""

          if [ -f "$state_file" ]; then
            last_tag="$(jq -r '.tagName // ""' "$state_file")"
            last_sha="$(jq -r '.commitSha // ""' "$state_file")"
          fi

          echo "Current upstream tag: ${{ steps.release.outputs.tag }}"
          echo "Current upstream commit: $upstream_sha"
          echo "Last synced tag: $last_tag"
          echo "Last synced commit: $last_sha"

          if [ "$FORCE_SYNC" != "true" ] &&
             [ "$last_tag" = "${{ steps.release.outputs.tag }}" ] &&
             [ "$last_sha" = "$upstream_sha" ]; then
            echo "should_sync=false" >> "$GITHUB_OUTPUT"
            echo "Upstream release has not changed. Nothing to do."
            exit 0
          fi

          echo "should_sync=true" >> "$GITHUB_OUTPUT"
          echo "upstream_sha=$upstream_sha" >> "$GITHUB_OUTPUT"
          echo "upstream_short_sha=$upstream_short_sha" >> "$GITHUB_OUTPUT"

      - name: Sync upstream /skills into repository root
        if: steps.decide.outputs.should_sync == 'true'
        run: |
          set -euo pipefail

          test -d "upstream/$UPSTREAM_PATH"

          rsync -a --delete \
            --exclude ".git" \
            --exclude ".github" \
            --exclude ".sync" \
            "upstream/$UPSTREAM_PATH/" target/

          if [ -f upstream/LICENSE ]; then
            cp upstream/LICENSE target/LICENSE
          fi

      - name: Write sync metadata
        if: steps.decide.outputs.should_sync == 'true'
        run: |
          set -euo pipefail

          mkdir -p target/.sync

          jq -n \
            --arg upstreamRepo "$UPSTREAM_REPO" \
            --arg upstreamPath "$UPSTREAM_PATH" \
            --arg tagName "${{ steps.release.outputs.tag }}" \
            --arg releaseUrl "${{ steps.release.outputs.url }}" \
            --arg publishedAt "${{ steps.release.outputs.published_at }}" \
            --arg commitSha "${{ steps.decide.outputs.upstream_sha }}" \
            --arg syncedAt "$(date -u +"%Y-%m-%dT%H:%M:%SZ")" \
            '{
              upstreamRepo: $upstreamRepo,
              upstreamPath: $upstreamPath,
              tagName: $tagName,
              releaseUrl: $releaseUrl,
              publishedAt: $publishedAt,
              commitSha: $commitSha,
              syncedAt: $syncedAt
            }' > target/.sync/upstream-release.json

          cat > target/UPSTREAM.md <<EOF
          # Upstream sync metadata

          This repository mirrors the \`skills/\` directory from:

          \`$UPSTREAM_REPO\`

          Latest synced upstream release:

          \`${{ steps.release.outputs.tag }}\`

          Upstream commit:

          \`${{ steps.decide.outputs.upstream_sha }}\`

          Upstream release:

          ${{ steps.release.outputs.url }}

          Source path:

          \`skills/\`
          EOF

      - name: Generate skills manifest
        if: steps.decide.outputs.should_sync == 'true'
        working-directory: target
        run: |
          set -euo pipefail

          {
            echo "# Skills manifest"
            echo
            echo "Synced from upstream release: \`${{ steps.release.outputs.tag }}\`"
            echo
            echo "Upstream commit: \`${{ steps.decide.outputs.upstream_sha }}\`"
            echo
            echo "Detected skill directories:"
            echo

            found=false

            while IFS= read -r skill_md; do
              dir="$(dirname "$skill_md")"
              found=true
              echo "- \`${dir#./}\`"
            done < <(find . -mindepth 2 -maxdepth 4 -name "SKILL.md" | sort)

            if [ "$found" = false ]; then
              echo "- No \`SKILL.md\` files detected."
            fi
          } > SKILLS_MANIFEST.md

      - name: Commit synced files
        if: steps.decide.outputs.should_sync == 'true'
        id: commit
        working-directory: target
        run: |
          set -euo pipefail

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add -A

          if git diff --cached --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No file changes after sync."
            exit 0
          fi

          git commit -m "Sync skills from upstream release ${{ steps.release.outputs.tag }}"
          git push

          echo "changed=true" >> "$GITHUB_OUTPUT"

      - name: Build clean release zip assets
        if: steps.commit.outputs.changed == 'true' && (github.event_name == 'schedule' || inputs.publish_release)
        working-directory: target
        run: |
          set -euo pipefail

          rm -rf ../dist
          mkdir -p ../dist/all-skills
          mkdir -p ../dist/individual

          rsync -a \
            --exclude ".git" \
            --exclude ".github" \
            --exclude ".sync" \
            --exclude "UPSTREAM.md" \
            --exclude "SKILLS_MANIFEST.md" \
            ./ ../dist/all-skills/

          cd ../dist/all-skills
          zip -r ../skills-source.zip .
          cd - >/dev/null

          dist_dir="$(realpath ../dist/individual)"

          while IFS= read -r skill_md; do
            skill_dir="$(dirname "$skill_md")"
            rel="${skill_dir#./}"
            zip_name="$(echo "$rel" | sed 's#[/ ][/ ]*#-#g' | sed 's#[^A-Za-z0-9._-]#-#g')"

            echo "Packaging skill: $rel -> ${zip_name}.zip"

            (
              cd "$skill_dir"
              zip -r "$dist_dir/${zip_name}.zip" .
            )
          done < <(find . -mindepth 2 -maxdepth 4 -name "SKILL.md" | sort)

      - name: Create GitHub release
        if: steps.commit.outputs.changed == 'true' && (github.event_name == 'schedule' || inputs.publish_release)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        working-directory: target
        run: |
          set -euo pipefail

          safe_tag="$(echo "${{ steps.release.outputs.tag }}" | sed 's#[^A-Za-z0-9._-]#-#g')"
          mirror_tag="upstream-${safe_tag}-${{ steps.decide.outputs.upstream_short_sha }}"
          target_sha="$(git rev-parse HEAD)"

          if gh release view "$mirror_tag" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            echo "Release $mirror_tag already exists."
            exit 0
          fi

          assets=()
          assets+=("../dist/skills-source.zip")

          if ls ../dist/individual/*.zip >/dev/null 2>&1; then
            for f in ../dist/individual/*.zip; do
              assets+=("$f")
            done
          fi

          gh release create "$mirror_tag" "${assets[@]}" \
            --repo "$GITHUB_REPOSITORY" \
            --target "$target_sha" \
            --title "Skills sync from upstream ${{ steps.release.outputs.tag }}" \
            --notes "Synced from upstream release: ${{ steps.release.outputs.tag }}

          Upstream release: ${{ steps.release.outputs.url }}

          Upstream commit: ${{ steps.decide.outputs.upstream_sha }}

          Source path: skills/"
