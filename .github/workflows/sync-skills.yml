name: Mirror upstream skills folder

on:
  workflow_dispatch:
    inputs:
      upstream_ref:
        description: "Upstream branch, tag, or commit to sync"
        required: true
        default: "main"
        type: string
      publish_release:
        description: "Create release assets after syncing"
        required: true
        default: true
        type: boolean

  schedule:
    # 每天 UTC 02:00 自动检查一次。新加坡时间约 10:00。
    - cron: "0 2 * * *"

concurrency:
  group: mirror-upstream-skills
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout target repository
        uses: actions/checkout@v6
        with:
          path: target
          fetch-depth: 0

      - name: Checkout upstream skills folder
        uses: actions/checkout@v6
        with:
          repository: hugohe3/ppt-master
          ref: ${{ inputs.upstream_ref || 'main' }}
          path: upstream
          sparse-checkout: |
            skills
            LICENSE
            README.md
          sparse-checkout-cone-mode: true

      - name: Read upstream commit metadata
        id: upstream
        run: |
          sha="$(git -C upstream rev-parse HEAD)"
          short_sha="$(git -C upstream rev-parse --short=12 HEAD)"
          date="$(git -C upstream log -1 --format=%cd --date=short)"

          echo "sha=$sha" >> "$GITHUB_OUTPUT"
          echo "short_sha=$short_sha" >> "$GITHUB_OUTPUT"
          echo "date=$date" >> "$GITHUB_OUTPUT"

      - name: Sync upstream /skills into repository root
        run: |
          rsync -a --delete \
            --exclude ".git" \
            --exclude ".github" \
            upstream/skills/ target/

          if [ -f upstream/LICENSE ]; then
            cp upstream/LICENSE target/LICENSE
          fi

          cat > target/UPSTREAM.md <<EOF
          # Upstream sync metadata

          This repository is an automated mirror of:

          https://github.com/hugohe3/ppt-master/tree/main/skills

          Last synced upstream commit:

          \`${{ steps.upstream.outputs.sha }}\`

          Source path:

          \`skills/\`

          Generated by GitHub Actions.
          EOF

      - name: Generate skills manifest
        working-directory: target
        run: |
          {
            echo "# Skills manifest"
            echo
            echo "Synced from: https://github.com/hugohe3/ppt-master/tree/${{ steps.upstream.outputs.sha }}/skills"
            echo
            echo "Upstream commit: \`${{ steps.upstream.outputs.sha }}\`"
            echo
            echo "Detected skill directories:"
            echo

            found=false

            while IFS= read -r skill_md; do
              dir="$(dirname "$skill_md")"
              found=true
              echo "- \`$dir\`"
            done < <(find . -mindepth 2 -maxdepth 3 -name "SKILL.md" | sort)

            if [ "$found" = false ]; then
              echo "- No \`SKILL.md\` files detected."
            fi
          } > SKILLS_MANIFEST.md

      - name: Commit synced files
        id: commit
        working-directory: target
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add -A

          if git diff --cached --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No changes to commit."
            exit 0
          fi

          git commit -m "Sync skills from upstream ${{ steps.upstream.outputs.short_sha }}"
          git push

          echo "changed=true" >> "$GITHUB_OUTPUT"

      - name: Build clean release zip assets
        if: steps.commit.outputs.changed == 'true' && (github.event_name != 'workflow_dispatch' || inputs.publish_release)
        working-directory: target
        run: |
          rm -rf ../dist
          mkdir -p ../dist/all-skills
          mkdir -p ../dist/individual

          rsync -a \
            --exclude ".git" \
            --exclude ".github" \
            ./ ../dist/all-skills/

          cd ../dist/all-skills
          zip -r ../skills-source.zip .
          cd -

          while IFS= read -r skill_md; do
            skill_dir="$(dirname "$skill_md")"
            skill_name="$(basename "$skill_dir")"

            echo "Packaging skill: $skill_name"

            cd "$skill_dir"
            zip -r "../../dist/individual/${skill_name}.zip" .
            cd - >/dev/null
          done < <(find . -mindepth 2 -maxdepth 3 -name "SKILL.md" | sort)

      - name: Create GitHub release
        if: steps.commit.outputs.changed == 'true' && (github.event_name != 'workflow_dispatch' || inputs.publish_release)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        working-directory: target
        run: |
          tag="upstream-${{ steps.upstream.outputs.short_sha }}"
          target_sha="$(git rev-parse HEAD)"

          if gh release view "$tag" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            echo "Release $tag already exists."
            exit 0
          fi

          assets=()
          assets+=("../dist/skills-source.zip")

          if ls ../dist/individual/*.zip >/dev/null 2>&1; then
            for f in ../dist/individual/*.zip; do
              assets+=("$f")
            done
          fi

          gh release create "$tag" "${assets[@]}" \
            --repo "$GITHUB_REPOSITORY" \
            --target "$target_sha" \
            --title "Skills sync ${{ steps.upstream.outputs.short_sha }}" \
            --notes "Synced from https://github.com/hugohe3/ppt-master/tree/${{ steps.upstream.outputs.sha }}/skills"